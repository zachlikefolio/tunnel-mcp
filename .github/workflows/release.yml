# Release workflow — publishes tunnel-mcp to npm and cuts a GitHub Release.
#
# Trigger: pushes of version tags matching 'v*' (e.g. v0.1.0).
#
# Authentication: npm Trusted Publishing (OIDC) — NO npm token or secret needed.
# One-time setup on npmjs.com: on the tunnel-mcp package page, open
# Settings -> "Trusted Publisher" and add a GitHub Actions publisher with:
#   - Organization or user: zachlikefolio
#   - Repository:           tunnel-mcp
#   - Workflow filename:    release.yml
#   - Allowed action:       npm publish
# npm automatically attaches a provenance attestation for trusted-publisher
# publishes (no --provenance flag required). GITHUB_TOKEN (provided
# automatically by Actions) is used only to create the GitHub Release.

name: Release

on:
  push:
    tags:
      - 'v*'

# Least privilege: read-only by default; the publish job scopes up to exactly
# what OIDC publishing and creating the GitHub Release require.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          # Node 24 bundles npm >= 11.5.1, which Trusted Publishing (OIDC) requires —
          # no separate npm upgrade step (and no unpinned install command) needed.
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Idempotency guard: if this exact version is already on npm (e.g. the
      # very first release was published manually), skip the publish step so the
      # tag still produces a GitHub Release instead of failing on a duplicate.
      - name: Check if version already published
        id: published
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "tunnel-mcp@${VERSION}" version >/dev/null 2>&1; then
            echo "tunnel-mcp@${VERSION} is already on npm — skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: steps.published.outputs.exists == 'false'
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
