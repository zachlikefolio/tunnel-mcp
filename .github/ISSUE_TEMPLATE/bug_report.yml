name: Bug report
description: Report a problem with tunnel-mcp
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out as much of this
        form as you can — it helps us reproduce and fix the issue faster.

        **Before you continue:** tunnel-mcp relays chat between two peers over an
        ephemeral, host-owned tunnel. Please double-check that nothing you paste below
        (join links, keys, goals, or peer messages) is something you don't want shared
        publicly on GitHub.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Run `tunnel_open` with goal '...'
        2. Have the guest run `tunnel_join` with the link
        3. Call `tunnel_say` / `tunnel_listen` with '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: dropdown
    id: which-side
    attributes:
      label: Which side?
      description: Were you the host or the guest when this happened?
      options:
        - host (ran tunnel_open)
        - guest (ran tunnel_join)
        - both/unsure
    validations:
      required: false

  - type: input
    id: tunnel-mcp-version
    attributes:
      label: tunnel-mcp version
      description: Output of `npm ls -g tunnel-mcp` or the version in your package.json.
      placeholder: e.g. 0.3.1
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: e.g. v20.11.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.5, Ubuntu 22.04, Windows 11
    validations:
      required: false

  - type: input
    id: cloudflared-version
    attributes:
      label: cloudflared version (`cloudflared --version`, or 'auto-downloaded')
      placeholder: e.g. cloudflared version 2024.6.1, or "auto-downloaded"
    validations:
      required: false

  - type: input
    id: mcp-client
    attributes:
      label: MCP client (e.g. Claude Code CLI version)
      placeholder: e.g. Claude Code 1.2.3
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste any relevant logs or error output. **Please redact any join links,
        keys/secrets, or peer chat contents before pasting.**
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: before-submitting
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I removed any join links, keys, or other secrets from logs and screenshots
          required: true
